services:
  - type: web
    name: poseperfect-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1 --log-level info

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

      # ── Email (Gmail SMTP) ────────────────────────────────────────────────
      - key: SMTP_HOST
        value: smtp.gmail.com

      - key: SMTP_PORT
        value: "587"

      - key: SMTP_FROM_NAME
        value: PosePerfect

      # Set these two in Render Dashboard → Environment (never commit passwords)
      - key: SMTP_USER
        sync: false        # e.g. mavanidevam30@gmail.com

      - key: SMTP_PASS
        sync: false        # 16-char Gmail App Password (no spaces)

      # ── Telegram ─────────────────────────────────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false        # from @BotFather

      - key: TELEGRAM_CHAT_ID
        sync: false        # your personal admin chat ID (from @userinfobot)

      # ── Firebase Admin SDK ───────────────────────────────────────────────
      # Upload serviceAccountKey.json via Render Dashboard → Environment → Secret Files
      # Render places it at /etc/secrets/serviceAccountKey.json automatically
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        value: /etc/secrets/serviceAccountKey.json
